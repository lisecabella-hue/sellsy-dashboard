<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard CEO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .header { background: white; border-bottom: 1px solid #e5e5e5; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 500; }
    .header span { font-size: 13px; color: #888; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .controls-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .period-btns { display: flex; gap: 6px; background: white; border: 1px solid #e5e5e5; border-radius: 10px; padding: 4px; }
    .period-btn { font-size: 13px; padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer; background: transparent; color: #666; font-weight: 500; transition: all 0.15s; }
    .period-btn:hover { background: #f5f5f5; color: #1a1a1a; }
    .period-btn.active { background: #1a1a1a; color: white; }
    .date-selectors { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    select, input[type="date"] { font-size: 13px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; color: #1a1a1a; }
    .sep { font-size: 13px; color: #888; }
    .btn { font-size: 14px; padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer; }
    .btn-primary { background: #1a1a1a; color: white; font-weight: 500; }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 12px; color: #888; display: flex; align-items: center; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; display: inline-block; }
    .dot.ok { background: #1D9E75; } .dot.err { background: #D85A30; } .dot.spin { background: #EF9F27; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .error-box { background: #fff0f0; border: 1px solid #fcc; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #c00; margin-bottom: 16px; display: none; }
    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .metric-card { background: white; border-radius: 12px; padding: 24px; border: 1px solid #e5e5e5; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 500; }
    .metric-sub { font-size: 12px; margin-top: 6px; color: #888; }
    .chart-card { background: white; border-radius: 12px; padding: 24px; border: 1px solid #e5e5e5; margin-bottom: 24px; }
    .chart-title { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; font-weight: 500; font-size: 12px; color: #888; padding: 8px; border-bottom: 1px solid #e5e5e5; }
    td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .badge-paid { background: #E1F5EE; color: #0F6E56; }
    .badge-pending { background: #FAEEDA; color: #854F0B; }
    .badge-late { background: #FCEBEB; color: #A32D2D; }
    .badge-cancelled { background: #f0f0f0; color: #666; }
    .period-label { font-size: 20px; font-weight: 500; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Dashboard CEO</h1>
    <span id="lastUpdate">Pas encore actualisé</span>
  </div>
  <div class="container">
    <div class="controls-bar">
      <div class="period-btns">
        <button class="period-btn" id="btnToday" onclick="setPeriod('today')">Aujourd'hui</button>
        <button class="period-btn" id="btnWeek" onclick="setPeriod('week')">Cette semaine</button>
        <button class="period-btn active" id="btnMonth" onclick="setPeriod('month')">Ce mois</button>
        <button class="period-btn" id="btnCustom" onclick="setPeriod('custom')">Période</button>
      </div>

      <div class="date-selectors" id="selectorsMonth">
        <select id="selMonth">
          <option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option>
          <option value="3">Avril</option><option value="4">Mai</option><option value="5">Juin</option>
          <option value="6">Juillet</option><option value="7">Août</option><option value="8">Septembre</option>
          <option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
        </select>
        <select id="selYear"></select>
      </div>

      <div class="date-selectors" id="selectorsCustom" style="display:none;">
        <input type="date" id="dateFrom" />
        <span class="sep">→</span>
        <input type="date" id="dateTo" />
      </div>

      <button class="btn btn-primary" onclick="loadData()">↻ Voir</button>
      <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">En attente</span></div>
    </div>

    <div class="error-box" id="errorBox"></div>
    <p class="period-label" id="periodLabel"></p>

    <div class="metric-grid">
      <div class="metric-card"><p class="metric-label">Chiffre d'affaires HT</p><p class="metric-value" id="mCA">—</p><p class="metric-sub">Total de la période</p></div>
      <div class="metric-card"><p class="metric-label">Nb factures</p><p class="metric-value" id="mCount">—</p><p class="metric-sub">Période sélectionnée</p></div>
      <div class="metric-card"><p class="metric-label">Panier moyen HT</p><p class="metric-value" id="mAvg">—</p><p class="metric-sub">Par facture</p></div>
    </div>

    <div class="chart-card">
      <p class="chart-title">Dernières factures</p>
      <table>
        <thead><tr><th>N° Facture</th><th>Montant HT</th><th>Date</th><th>Statut</th></tr></thead>
        <tbody id="invBody"><tr><td colspan="4" style="color:#888;text-align:center;padding:20px">Sélectionnez une période et cliquez sur Voir...</td></tr></tbody>
      </table>
    </div>
  </div>

<script>
const now = new Date();
const pad = n => String(n).padStart(2,'0');
const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
let currentMode = 'month';

// Init sélecteur années
const selYearEl = document.getElementById('selYear');
for(let y = now.getFullYear(); y >= 2015; y--) {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y;
  selYearEl.appendChild(opt);
}
document.getElementById('selMonth').value = now.getMonth();
document.getElementById('dateFrom').value = todayStr;
document.getElementById('dateTo').value = todayStr;

function setPeriod(mode) {
  currentMode = mode;
  ['today','week','month','custom'].forEach(m => {
    document.getElementById('btn' + m.charAt(0).toUpperCase() + m.slice(1)).classList.toggle('active', m === mode);
  });
  document.getElementById('selectorsMonth').style.display = mode === 'month' ? 'flex' : 'none';
  document.getElementById('selectorsCustom').style.display = mode === 'custom' ? 'flex' : 'none';
}

function setStatus(state, msg) {
  document.getElementById('statusDot').className = 'dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

function fmt(n) {
  return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
}

function getDates() {
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  if (currentMode === 'today') {
    return {
      dateStart: todayStr, dateEnd: todayStr,
      label: `Aujourd'hui — ${now.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}`
    };
  }

  if (currentMode === 'week') {
    const day = now.getDay() || 7;
    const monday = new Date(now);
    monday.setDate(now.getDate() - day + 1);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const ds = `${monday.getFullYear()}-${pad(monday.getMonth()+1)}-${pad(monday.getDate())}`;
    const de = `${sunday.getFullYear()}-${pad(sunday.getMonth()+1)}-${pad(sunday.getDate())}`;
    return {
      dateStart: ds, dateEnd: de,
      label: `Cette semaine — du ${monday.toLocaleDateString('fr-FR')} au ${sunday.toLocaleDateString('fr-FR')}`
    };
  }

  if (currentMode === 'month') {
    const month = parseInt(document.getElementById('selMonth').value);
    const year = parseInt(document.getElementById('selYear').value);
    const lastDay = new Date(year, month+1, 0).getDate();
    return {
      dateStart: `${year}-${pad(month+1)}-01`,
      dateEnd: `${year}-${pad(month+1)}-${pad(lastDay)}`,
      label: `${months[month]} ${year}`
    };
  }

  if (currentMode === 'custom') {
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    if (!from || !to) { alert('Veuillez sélectionner une date de début et de fin.'); return null; }
    const df = new Date(from + 'T12:00:00');
    const dt = new Date(to + 'T12:00:00');
    return {
      dateStart: from, dateEnd: to,
      label: `Du ${df.toLocaleDateString('fr-FR')} au ${dt.toLocaleDateString('fr-FR')}`
    };
  }
}

async function loadData() {
  const dates = getDates();
  if (!dates) return;
  const { dateStart, dateEnd, label } = dates;

  document.getElementById('errorBox').style.display='none';
  document.getElementById('periodLabel').textContent = label;
  setStatus('spin', 'Chargement...');
  document.getElementById('mCA').textContent = '...';
  document.getElementById('mCount').textContent = '...';
  document.getElementById('mAvg').textContent = '...';

  try {
    const [caResp, listResp] = await Promise.all([
      fetch(`/api/sellsy?dateStart=${dateStart}&dateEnd=${dateEnd}&mode=total`),
      fetch(`/api/sellsy?dateStart=${dateStart}&dateEnd=${dateEnd}&mode=list`)
    ]);

    if(!caResp.ok || !listResp.ok) throw new Error('Erreur API');

    const caData = await caResp.json();
    const listData = await listResp.json();

    const totalCA = caData._totalCA || 0;
    const count = caData.pagination?.total || caData._count || 0;
    const avg = count > 0 ? totalCA / count : 0;

    document.getElementById('mCA').textContent = fmt(totalCA);
    document.getElementById('mCount').textContent = count.toLocaleString('fr-FR');
    document.getElementById('mAvg').textContent = fmt(avg);

    const invoices = (listData.data || []).sort((a,b) => new Date(b.date) - new Date(a.date));
    renderInvoices(invoices.slice(0, 10));

    const t = new Date().toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpdate').textContent = 'Mis à jour le ' + t;
    setStatus('ok', 'Données à jour');

  } catch(e) {
    setStatus('err', 'Erreur');
    document.getElementById('errorBox').style.display='block';
    document.getElementById('errorBox').textContent = 'Erreur : ' + e.message;
  }
}

function renderInvoices(invoices) {
  const body = document.getElementById('invBody');
  if(!invoices.length) {
    body.innerHTML='<tr><td colspan="4" style="color:#888;text-align:center;padding:20px">Aucune facture trouvée</td></tr>';
    return;
  }
  body.innerHTML = invoices.map(inv => {
    const amount = parseFloat((inv.amounts && inv.amounts.total_excl_tax) || 0);
    const date = inv.date ? new Date(inv.date).toLocaleDateString('fr-FR') : '—';
    const numero = inv.number || '—';
    const status = inv.status || '';
    let badge = '<span class="badge badge-pending">En attente</span>';
    if(status==='paid') badge='<span class="badge badge-paid">Payée</span>';
    else if(status==='late') badge='<span class="badge badge-late">En retard</span>';
    else if(status==='due') badge='<span class="badge badge-pending">À régler</span>';
    else if(status==='payinprogress') badge='<span class="badge badge-pending">Paiement partiel</span>';
    else if(status==='cancelled') badge='<span class="badge badge-cancelled">Annulée</span>';
    return `<tr><td style="color:#888;font-size:12px">${numero}</td><td style="font-weight:500">${fmt(amount)}</td><td style="color:#888">${date}</td><td>${badge}</td></tr>`;
  }).join('');
}
</script>
</body>
</html>
